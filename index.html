<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta property="og:title" content="◆ FlowDeck">
  <meta property="og:description" content="The App for Everyone — AI Connects. Humans Create.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://cmccunney.github.io/flowdeck-demo/">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="◆ FlowDeck">
  <meta name="twitter:description" content="The App for Everyone — AI Connects. Humans Create.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>◆ FlowDeck — The App for Everyone</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #060a0f;
      color: #ccccdd;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    .logo {
      font-size: 13px;
      letter-spacing: 4px;
      color: #667;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .title {
      font-size: clamp(28px, 6vw, 52px);
      letter-spacing: 3px;
      color: #4f8cff;
      text-transform: uppercase;
      margin-bottom: 8px;
      text-shadow: 0 0 30px rgba(79,140,255,0.4);
    }

    .tagline {
      font-size: 14px;
      color: #44cc88;
      letter-spacing: 2px;
      margin-bottom: 60px;
    }

    .cards {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 800px;
      width: 100%;
    }

    .card {
      background: #080c10;
      border: 1px solid #1a2030;
      border-radius: 4px;
      padding: 40px 36px;
      text-align: center;
      flex: 1;
      min-width: 260px;
      max-width: 340px;
      transition: border-color 0.2s, transform 0.2s;
      text-decoration: none;
      display: block;
      cursor: pointer;
    }

    .card:hover {
      border-color: #4f8cff;
      transform: translateY(-3px);
    }

    .card-emoji {
      font-size: 52px;
      margin-bottom: 20px;
      display: block;
    }

    .card-title {
      font-size: 16px;
      letter-spacing: 3px;
      color: #ccccdd;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .card-sub {
      font-size: 12px;
      color: #667;
      letter-spacing: 1px;
      line-height: 1.6;
    }

    .card.parents:hover { border-color: #44cc88; }
    .card.kids:hover    { border-color: #ff9944; }

    .card.parents .card-title { color: #44cc88; }
    .card.kids    .card-title { color: #ff9944; }

    .footer {
      margin-top: 70px;
      font-size: 11px;
      color: #445;
      letter-spacing: 2px;
      text-align: center;
    }

    .footer span {
      color: #44cc88;
    }
  </style>
</head>
<body>

  <div class="logo">◆ FlowDeck</div>
  <h1 class="title">The App for Everyone</h1>
  <p class="tagline">AI Connects. Humans Create.</p>

  <div class="cards">
    <a href="parents.html" class="card parents">
      <span class="card-emoji">❤️</span>
      <div class="card-title">For Mom &amp; Dad</div>
      <div class="card-sub">The story of what Cory has been building — written just for you.</div>
    </a>

    <a href="kids.html" class="card kids">
      <span class="card-emoji">🎮</span>
      <div class="card-title">For Natalie, Max &amp; Eve</div>
      <div class="card-sub">An adventure story about an app that helps people do what they love.</div>
    </a>
  </div>

  <div class="footer">
    Built by <span>Cory McCunney</span> · FlowDeck 2026
  </div>

</body>
</html>
